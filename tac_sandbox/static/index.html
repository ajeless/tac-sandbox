<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tac-sandbox</title>
    <style>
      :root {
        --bg: #09111d;
        --panel: rgba(8, 20, 35, 0.8);
        --panel-strong: rgba(7, 16, 28, 0.92);
        --panel-border: rgba(145, 170, 196, 0.2);
        --text: #e6edf6;
        --muted: #8ea3bb;
        --grid-fill: rgba(23, 44, 71, 0.62);
        --grid-stroke: rgba(104, 134, 169, 0.45);
        --accent: #f0c46a;
        --red: #ff6f61;
        --blue: #79b8ff;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iosevka", "IBM Plex Mono", "SFMono-Regular", monospace;
        background:
          radial-gradient(circle at top left, rgba(70, 112, 165, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(240, 196, 106, 0.12), transparent 32%),
          linear-gradient(180deg, #07111b 0%, #0b1522 100%);
        color: var(--text);
      }

      button,
      input {
        border: 1px solid rgba(145, 170, 196, 0.22);
        border-radius: 12px;
        background: rgba(13, 27, 44, 0.85);
        color: var(--text);
        font: inherit;
      }

      button {
        padding: 11px 14px;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: rgba(240, 196, 106, 0.55);
        background: rgba(18, 35, 56, 0.95);
      }

      button:disabled,
      input:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      button:disabled:hover {
        transform: none;
        border-color: rgba(145, 170, 196, 0.22);
        background: rgba(13, 27, 44, 0.85);
      }

      input {
        width: 100%;
        padding: 10px 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.76rem;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .app {
        height: 100vh;
        padding: 18px;
        display: grid;
        grid-template-rows: minmax(240px, 30vh) minmax(0, 1fr);
        gap: 18px;
        overflow: hidden;
      }

      .card {
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
      }

      .dock {
        padding: 18px 20px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 16px;
        min-height: 0;
        overflow: hidden;
      }

      .dock-header,
      .section-header,
      .board-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .header-left {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 12px;
        min-width: 0;
      }

      .title {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .subhead {
        margin: 0;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .phase-chip {
        color: var(--accent);
        font-size: 0.9rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .status {
        min-height: 44px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(8, 16, 29, 0.9);
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.35;
        overflow-y: auto;
        white-space: pre-wrap;
      }

      .dock-body {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1.65fr) minmax(260px, 0.75fr);
        gap: 16px;
      }

      .unit-section,
      .event-section {
        min-height: 0;
        display: grid;
        gap: 10px;
      }

      .unit-section {
        grid-template-rows: auto minmax(0, 1fr);
      }

      .event-section {
        grid-template-rows: auto auto auto minmax(0, 1fr);
      }

      .unit-grid {
        min-height: 0;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(240px, 1fr);
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .unit-card,
      .event-card {
        border-radius: 16px;
        background: rgba(8, 16, 29, 0.92);
        border: 1px solid rgba(145, 170, 196, 0.14);
      }

      .unit-card {
        padding: 12px 14px;
        display: grid;
        gap: 8px;
      }

      .unit-card[data-side="red"] {
        border-left: 3px solid var(--red);
      }

      .unit-card[data-side="blue"] {
        border-left: 3px solid var(--blue);
      }

      .unit-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: start;
      }

      .unit-head {
        min-width: 0;
        display: grid;
        gap: 6px;
      }

      .unit-title {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px;
      }

      .unit-meta {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.35;
      }

      .tag {
        color: var(--accent);
      }

      .plot-stack {
        display: grid;
        gap: 8px;
        justify-items: end;
        align-self: start;
      }

      .plot-field {
        gap: 4px;
        justify-items: end;
        font-size: 0.68rem;
      }

      .plot-field input {
        width: 4.5rem;
        min-width: 4.5rem;
        padding: 6px 8px;
        text-align: center;
      }

      .events {
        min-height: 0;
        display: grid;
        gap: 10px;
        overflow-y: auto;
      }

      .event-card {
        padding: 12px 14px;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.35;
      }

      .board-panel {
        min-height: 0;
        padding: 18px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 12px;
        overflow: hidden;
      }

      #board {
        width: 100%;
        height: 100%;
        min-height: 0;
        border-radius: 18px;
        background:
          radial-gradient(circle at center, rgba(26, 54, 86, 0.35), transparent 55%),
          linear-gradient(180deg, rgba(6, 15, 27, 0.96), rgba(9, 19, 32, 0.98));
      }

      @media (max-width: 980px) {
        .app {
          grid-template-rows: auto minmax(0, 1fr);
        }

        .dock-body {
          grid-template-columns: 1fr;
        }

        .unit-grid {
          grid-auto-flow: row;
          grid-auto-columns: initial;
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
          overflow-x: visible;
        }

        .unit-layout {
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="dock card">
        <div class="dock-header">
          <div class="header-left">
            <h1 class="title" id="title">tac-sandbox</h1>
            <div class="subhead" id="turn-meta">Loading...</div>
            <div class="phase-chip" id="phase-meta">Phase</div>
            <div class="subhead" id="phase-guide">Loading flow...</div>
          </div>
          <div class="action-row">
            <button id="plot-button" type="button">Submit Plots</button>
            <button id="step-button" type="button">Step</button>
            <button id="reset-button" type="button">Reset</button>
            <button id="refresh-button" type="button">Refresh</button>
          </div>
        </div>

        <div class="dock-body">
          <section class="unit-section">
            <div class="section-header">
              <div class="title" style="font-size:1rem;">Unit Orders</div>
              <div class="subhead">Per-unit draft inputs, one shared submit</div>
            </div>
            <div id="units" class="unit-grid"></div>
          </section>

          <section class="event-section">
            <div class="section-header">
              <div class="title" style="font-size:1rem;">Status</div>
              <div class="subhead">Latest engine feedback</div>
            </div>
            <div id="status" class="status">Ready</div>
            <div class="section-header">
              <div class="title" style="font-size:1rem;">Recent Events</div>
              <div class="subhead">Latest engine log entries</div>
            </div>
            <div id="events" class="events"></div>
          </section>
        </div>
      </section>

      <section class="board-panel card">
        <div class="board-header">
          <div class="title" style="font-size:1rem;">Board</div>
          <div class="subhead">Renderer consumes snapshot state only</div>
        </div>
        <svg id="board" viewBox="0 0 800 600" aria-label="tactical board"></svg>
      </section>
    </div>

    <script>
      const board = document.getElementById("board");
      const titleEl = document.getElementById("title");
      const turnMetaEl = document.getElementById("turn-meta");
      const phaseMetaEl = document.getElementById("phase-meta");
      const phaseGuideEl = document.getElementById("phase-guide");
      const statusEl = document.getElementById("status");
      const unitsEl = document.getElementById("units");
      const eventsEl = document.getElementById("events");
      const plotButton = document.getElementById("plot-button");
      const stepButton = document.getElementById("step-button");
      const resetButton = document.getElementById("reset-button");
      const refreshButton = document.getElementById("refresh-button");

      let snapshot = null;
      let plotDrafts = {};

      function defaultDraft(entity) {
        const plot = entity.plot || { heading: entity.facing, speed: entity.stats.speed };
        return { heading: plot.heading, speed: plot.speed };
      }

      function rebuildDrafts(entities) {
        const nextDrafts = {};
        for (const entity of entities) {
          nextDrafts[entity.id] = defaultDraft(entity);
        }
        plotDrafts = nextDrafts;
      }

      function phaseConfig(phase, terminal) {
        if (terminal) {
          return {
            label: "Session Ended",
            guide: terminal.text,
            plotEnabled: false,
            plotLabel: "Session Ended",
            stepEnabled: false,
            stepLabel: "No More Steps",
          };
        }
        if (phase === "plot_heading_speed") {
          return {
            label: "Plot Orders",
            guide: "Set heading and speed for each active ship, then lock orders.",
            plotEnabled: true,
            plotLabel: "Submit Plots",
            stepEnabled: true,
            stepLabel: "Lock Orders",
          };
        }
        if (phase === "resolve_plotted_move") {
          return {
            label: "Resolve Movement",
            guide: "Orders are locked. The next step resolves movement.",
            plotEnabled: false,
            plotLabel: "Plots Locked",
            stepEnabled: true,
            stepLabel: "Resolve Movement",
          };
        }
        if (phase === "resolve_attacks") {
          return {
            label: "Resolve Attacks",
            guide: "Movement is complete. The next step resolves attacks.",
            plotEnabled: false,
            plotLabel: "Await Next Turn",
            stepEnabled: true,
            stepLabel: "Resolve Attacks",
          };
        }
        return {
          label: phase,
          guide: "Unknown phase",
          plotEnabled: false,
          plotLabel: "Submit Plots",
          stepEnabled: true,
          stepLabel: "Step",
        };
      }

      function statusText(result) {
        if (!result) {
          return "Ready";
        }
        if (result.status === "awaiting_input") {
          const missing = (result.missing_units || []).join(", ");
          return missing ? `Missing plots: ${missing}` : "Missing plots";
        }
        if (result.status === "input_recorded") {
          return `Stored ${result.unit} plot ${result.plot.heading}:${result.plot.speed}`;
        }
        if (result.status === "terminal") {
          return result.terminal.text;
        }
        if (result.status === "resolved") {
          if (result.terminal) {
            return result.terminal.text;
          }
          if (result.phase === "plot_heading_speed") {
            return "Orders locked. Next: resolve movement.";
          }
          if (result.phase === "resolve_plotted_move") {
            return "Movement resolved. Next: resolve attacks.";
          }
          if (result.phase === "resolve_attacks") {
            return "Attacks resolved. Next: enter new plots.";
          }
          return `Resolved ${result.phase} -> ${result.next_phase}`;
        }
        if (result.status === "reset") {
          return "Session reset";
        }
        if (result.status === "rejected") {
          return (result.errors || []).join("\n") || "Input rejected";
        }
        return JSON.stringify(result);
      }

      async function request(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      async function refresh() {
        const data = await request("/api/state");
        applySnapshot(data.snapshot);
        statusEl.textContent = data.snapshot.terminal ? data.snapshot.terminal.text : "Ready";
      }

      async function applyAction(path, body = {}) {
        const data = await request(path, {
          method: "POST",
          body: JSON.stringify(body),
        });
        applySnapshot(data.snapshot);
        statusEl.textContent = statusText(data.result);
      }

      async function submitPlots() {
        if (!snapshot) {
          return;
        }
        if (snapshot.terminal) {
          statusEl.textContent = snapshot.terminal.text;
          return;
        }
        if (snapshot.turn.phase !== "plot_heading_speed") {
          statusEl.textContent = "Plots can only be submitted during Plot Orders.";
          return;
        }

        const activeEntities = snapshot.entities.filter((entity) => !entity.destroyed);
        let latestSnapshot = snapshot;
        const recordedUnits = [];
        const errors = [];

        for (const entity of activeEntities) {
          const draft = plotDrafts[entity.id] || defaultDraft(entity);
          const data = await request("/api/plot", {
            method: "POST",
            body: JSON.stringify({
              unit: entity.id,
              heading: Number(draft.heading),
              speed: Number(draft.speed),
            }),
          });
          latestSnapshot = data.snapshot;
          if (data.result.status === "input_recorded") {
            recordedUnits.push(data.result.unit);
            continue;
          }
          errors.push(statusText(data.result));
        }

        applySnapshot(latestSnapshot);
        if (errors.length > 0) {
          statusEl.textContent = errors.join("\n");
          return;
        }
        statusEl.textContent = recordedUnits.length > 0
          ? `Stored plots for ${recordedUnits.join(", ")}. Next: lock orders.`
          : "No active units";
      }

      function applySnapshot(nextSnapshot) {
        snapshot = nextSnapshot;
        rebuildDrafts(snapshot.entities);
        const config = phaseConfig(snapshot.turn.phase, snapshot.terminal);
        titleEl.textContent = snapshot.title;
        turnMetaEl.textContent = `Turn ${snapshot.turn.number}`;
        phaseMetaEl.textContent = config.label;
        phaseGuideEl.textContent = config.guide;
        plotButton.disabled = !config.plotEnabled;
        plotButton.textContent = config.plotLabel;
        stepButton.disabled = !config.stepEnabled;
        stepButton.textContent = config.stepLabel;
        renderUnits(snapshot.entities);
        renderEvents(snapshot.recent_events);
        renderBoard(snapshot);
      }

      function updateDraft(unitId, field, value) {
        if (!(unitId in plotDrafts)) {
          return;
        }
        plotDrafts[unitId][field] = value;
      }

      function renderUnits(entities) {
        unitsEl.innerHTML = "";
        const plotEditable = snapshot && snapshot.turn.phase === "plot_heading_speed" && !snapshot.terminal;
        for (const entity of entities) {
          const card = document.createElement("article");
          card.className = "unit-card";
          card.dataset.side = entity.side;

          const draft = plotDrafts[entity.id] || defaultDraft(entity);
          const plotText = entity.plot
            ? `locked plot ${entity.plot.heading}:${entity.plot.speed}`
            : "no locked plot";

          card.innerHTML = `
            <div class="unit-layout">
              <div class="unit-head">
                <div class="unit-title">
                  <strong>${entity.id}</strong>
                  ${entity.destroyed ? '<span class="tag">destroyed</span>' : ""}
                </div>
                <div class="unit-meta">
                  <div>hex ${entity.at[0]},${entity.at[1]} | facing ${entity.facing}</div>
                  <div>hull ${entity.stats.hull} | shield ${entity.stats.shield} | speed ${entity.stats.speed} / max ${entity.stats.max_speed}</div>
                  <div>${plotText}</div>
                </div>
              </div>
              <div class="plot-stack">
                <label class="plot-field">
                  Heading
                  <input data-unit="${entity.id}" data-field="heading" type="number" min="0" max="5" value="${draft.heading}" ${entity.destroyed || !plotEditable ? "disabled" : ""}>
                </label>
                <label class="plot-field">
                  Speed
                  <input data-unit="${entity.id}" data-field="speed" type="number" min="0" max="${entity.stats.max_speed}" value="${draft.speed}" ${entity.destroyed || !plotEditable ? "disabled" : ""}>
                </label>
              </div>
            </div>
          `;

          unitsEl.appendChild(card);
        }

        for (const input of unitsEl.querySelectorAll("input[data-unit]")) {
          input.addEventListener("input", (event) => {
            const target = event.currentTarget;
            updateDraft(target.dataset.unit, target.dataset.field, Number(target.value));
          });
        }
      }

      function renderEvents(events) {
        eventsEl.innerHTML = "";
        if (events.length === 0) {
          const empty = document.createElement("div");
          empty.className = "event-card";
          empty.textContent = "No events yet";
          eventsEl.appendChild(empty);
          return;
        }

        for (const item of events.slice().reverse()) {
          const card = document.createElement("div");
          card.className = "event-card";
          card.textContent = item.text;
          eventsEl.appendChild(card);
        }
      }

      function renderBoard(snapshot) {
        const size = 90;
        const padding = size + 28;
        const viewportScale = 1.2;
        const shipScale = 1.5;
        const hexes = boardHexes(snapshot.board).map(({ q, r }) => {
          const [x, y] = axialToPixel(snapshot.board, q, r, size);
          return { q, r, x, y };
        });

        if (hexes.length === 0) {
          board.innerHTML = "";
          return;
        }

        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        for (const hex of hexes) {
          minX = Math.min(minX, hex.x);
          minY = Math.min(minY, hex.y);
          maxX = Math.max(maxX, hex.x);
          maxY = Math.max(maxY, hex.y);
        }

        const contentWidth = (maxX - minX) + (padding * 2);
        const contentHeight = (maxY - minY) + (padding * 2);
        const viewportWidth = contentWidth * viewportScale;
        const viewportHeight = contentHeight * viewportScale;
        const offsetX = (viewportWidth - contentWidth) / 2;
        const offsetY = (viewportHeight - contentHeight) / 2;
        const viewX = minX - padding - offsetX;
        const viewY = minY - padding - offsetY;

        board.setAttribute("viewBox", `${viewX} ${viewY} ${viewportWidth} ${viewportHeight}`);
        board.innerHTML = "";

        for (const hex of hexes) {
          const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
          polygon.setAttribute("points", hexPoints(snapshot.board, hex.x, hex.y, size - 1));
          polygon.setAttribute("fill", "var(--grid-fill)");
          polygon.setAttribute("stroke", "var(--grid-stroke)");
          polygon.setAttribute("stroke-width", "1.4");
          board.appendChild(polygon);

          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("x", hex.x);
          label.setAttribute("y", hex.y - 18);
          label.setAttribute("text-anchor", "middle");
          label.setAttribute("dominant-baseline", "middle");
          label.setAttribute("font-size", "17");
          label.setAttribute("font-weight", "600");
          label.setAttribute("fill", "rgba(122, 142, 166, 0.46)");
          label.textContent = `${hex.q},${hex.r}`;
          board.appendChild(label);
        }

        for (const entity of snapshot.entities) {
          const [x, y] = axialToPixel(snapshot.board, entity.at[0], entity.at[1], size);
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          group.setAttribute("transform", `translate(${x} ${y}) rotate(${headingAngle(snapshot.heading, entity.facing)}) scale(${shipScale})`);

          const hull = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
          hull.setAttribute("points", "-13.5,8.4375 15.1875,0 -13.5,-8.4375");
          hull.setAttribute("fill", entity.side === "red" ? "var(--red)" : "var(--blue)");
          hull.setAttribute("stroke", "rgba(248, 249, 252, 0.85)");
          hull.setAttribute("stroke-width", entity.destroyed ? "1.5" : "2.1");
          hull.setAttribute("opacity", entity.destroyed ? "0.35" : "0.95");
          group.appendChild(hull);
          board.appendChild(group);

          const badge = document.createElementNS("http://www.w3.org/2000/svg", "text");
          badge.setAttribute("x", x);
          badge.setAttribute("y", y - 35.4375);
          badge.setAttribute("text-anchor", "middle");
          badge.setAttribute("font-size", "25.3125");
          badge.setAttribute("fill", "#f4f7fb");
          badge.textContent = `${entity.id} h${entity.stats.hull}/s${entity.stats.shield}/spd${entity.stats.speed}`;
          board.appendChild(badge);

          if (entity.plot) {
            const plotLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
            plotLabel.setAttribute("x", x);
            plotLabel.setAttribute("y", y + 40.5);
            plotLabel.setAttribute("text-anchor", "middle");
            plotLabel.setAttribute("font-size", "22.78125");
            plotLabel.setAttribute("fill", "var(--accent)");
            plotLabel.textContent = `plot ${entity.plot.heading}:${entity.plot.speed}`;
            board.appendChild(plotLabel);
          }
        }
      }

      function boardHexes(board) {
        if (board.footprint === "radius") {
          const [centerQ, centerR] = board.center;
          const hexes = [];
          for (let q = centerQ - board.radius; q <= centerQ + board.radius; q += 1) {
            for (let r = centerR - board.radius; r <= centerR + board.radius; r += 1) {
              if (hexDistance([q, r], [centerQ, centerR]) <= board.radius) {
                hexes.push({ q, r });
              }
            }
          }
          return hexes;
        }

        const [widthCount, heightCount] = board.bounds;
        const hexes = [];
        for (let q = 0; q < widthCount; q += 1) {
          for (let r = 0; r < heightCount; r += 1) {
            hexes.push({ q, r });
          }
        }
        return hexes;
      }

      function axialToPixel(board, q, r, size) {
        if (board.orientation === "pointy_top") {
          return [
            Math.sqrt(3) * size * (q + r / 2),
            1.5 * size * r,
          ];
        }
        return [
          1.5 * size * q,
          Math.sqrt(3) * size * (r + q / 2),
        ];
      }

      function hexDistance(a, b) {
        const [aq, ar] = a;
        const [bq, br] = b;
        const ax = aq;
        const ay = -aq - ar;
        const az = ar;
        const bx = bq;
        const by = -bq - br;
        const bz = br;
        return Math.max(
          Math.abs(ax - bx),
          Math.abs(ay - by),
          Math.abs(az - bz),
        );
      }

      function headingAngle(headingConfig, heading) {
        if (headingConfig.zero === "east") {
          return 60 * heading;
        }
        return -90 + (60 * heading);
      }

      function hexPoints(board, x, y, size) {
        const points = [];
        for (let index = 0; index < 6; index += 1) {
          const startAngle = board.orientation === "pointy_top" ? -30 : 0;
          const angle = (startAngle + (60 * index)) * Math.PI / 180;
          points.push(`${x + (Math.cos(angle) * size)},${y + (Math.sin(angle) * size)}`);
        }
        return points.join(" ");
      }

      plotButton.addEventListener("click", () => {
        submitPlots().catch((error) => {
          statusEl.textContent = String(error);
        });
      });

      stepButton.addEventListener("click", () => {
        applyAction("/api/step").catch((error) => {
          statusEl.textContent = String(error);
        });
      });

      resetButton.addEventListener("click", () => {
        applyAction("/api/reset").catch((error) => {
          statusEl.textContent = String(error);
        });
      });

      refreshButton.addEventListener("click", () => {
        refresh().catch((error) => {
          statusEl.textContent = String(error);
        });
      });

      refresh().catch((error) => {
        statusEl.textContent = String(error);
      });
    </script>
  </body>
</html>
